<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de paletas de colores</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header class="encabezado">
        <button class="btn-tema" type="button" aria-label="Modo claro">☀️</button>
        <h1 class="titulo-principal">Generador de <span>paletas</span></h1>
        <button class="btn-tema" type="button" aria-label="Modo oscuro">🌙</button>
    </header>

    <main class="contenedor-principal">

        <!-- tipo de selectores de colores -->
        <section class="selector-tipo">
            <button class="activo">Aleatorio</button>
            <button>Complementarios</button>
        </section>

        <!-- cantidad de colores -->
        <section class="selector-cantidad">
            <p>Cantidad de colores</p>
            <div class="botones-cantidad">
                <button class="activo">6</button>
                <button>8</button>
                <button>9</button>
            </div>
        </section>

        <!-- paleta visual -->
        <section class="zona-paleta">
            <div class="paleta-pintura">
                <div class="color color-1"></div>
                <div class="color color-2"></div>
                <div class="color color-3"></div>
                <div class="color color-4"></div>
                <div class="color color-5"></div>
                <div class="color color-6"></div>
            </div>
        </section>

        <!-- accion generar colores -->
        <section class="acciones">
            <button id="btn-generar">Generar colores</button>
        </section>

        <!-- extras -->
        <section class="acciones-extras">
            <button>Copiar todo</button>
            <button>Compartir</button>
            <button>Exportar PNG</button>
            <button>Guardar</button>
            <button>Favoritos</button>
        </section>

        <!-- preview colores -->
        <section class="vista-previa">
            <h2>Vista previa</h2>
            <div id="contenedor-colores" class="contenedor-colores"></div>
        </section>

    </main>

    <footer class="pie">
        <p>Tip: Haz clic en el candado para bloquear o desbloquear un color</p>
    </footer>

    <script src="./js/app.js"></script>

</body>

</html>
