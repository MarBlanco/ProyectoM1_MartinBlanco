<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="contenedor-principal">

        <!-- TITULO -->
        <header class="encabezado">
            <h1 class="titulo-principal">Generador de <span>paletas</span></h1>
        </header>

        <!-- FORMATO -->
        <section class="selector-formato">
            <p>Formato</p>
            <div class="opciones-formato">
                <label class="activo-formato"><input type="radio" name="formato" value="HSL" checked>HSL</label>
                <label><input type="radio" name="formato" value="HEX">HEX</label>
            </div>
        </section>

        <!-- CANTIDAD -->
        <section class="selector-cantidad">
            <p>Cantidad de colores</p>
            <div class="botones-cantidad">
                <button type="button" class="activo">6</button>
                <button type="button">8</button>
                <button type="button">9</button>
            </div>
        </section>

        <!-- TARJETAS -->
        <section class="paleta-colores" id="paleta-colores">
        </section>

        <!-- BOTON -->
        <section class="acciones">
            <button id="btn-generar" type="button">Generar paletas</button>
            <p id="mensaje-tip" aria-live="polite" role="status"></p>
        </section>

    </main>

    <script src="./js/app.js"></script>

</body>

</html>
